<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 420" font-family="Arial, sans-serif" font-size="13">
  <!-- MenuItem Class Box -->
  <rect x="30" y="20" width="300" height="280" rx="4" fill="#fffde7" stroke="#333" stroke-width="2"/>
  <!-- Title -->
  <rect x="30" y="20" width="300" height="32" rx="4" fill="#ffcc02" stroke="#333" stroke-width="2"/>
  <text x="180" y="42" text-anchor="middle" font-weight="bold" font-size="15">MenuItem</text>
  <!-- Divider -->
  <line x1="30" y1="52" x2="330" y2="52" stroke="#333" stroke-width="1.5"/>
  <!-- Attributes -->
  <text x="42" y="72" font-size="13">- name: string</text>
  <text x="42" y="92" font-size="13">- price: number</text>
  <text x="42" y="112" font-size="13">- category: string</text>
  <text x="42" y="132" font-size="13">- available: boolean</text>
  <text x="42" y="152" font-size="13" text-decoration="underline">- totalItems: number</text>
  <!-- Divider -->
  <line x1="30" y1="162" x2="330" y2="162" stroke="#333" stroke-width="1.5"/>
  <!-- Methods -->
  <text x="42" y="182" font-size="13">+ constructor(name, price, category)</text>
  <text x="42" y="202" font-size="13">+ getDetails(): string</text>
  <text x="42" y="222" font-size="13">+ toggleAvailability(): void</text>
  <text x="42" y="242" font-size="13" text-decoration="underline">+ getTotalItems(): number</text>

  <!-- Order Class Box -->
  <rect x="390" y="20" width="310" height="380" rx="4" fill="#e8f5e9" stroke="#333" stroke-width="2"/>
  <!-- Title -->
  <rect x="390" y="20" width="310" height="32" rx="4" fill="#66bb6a" stroke="#333" stroke-width="2"/>
  <text x="545" y="42" text-anchor="middle" font-weight="bold" font-size="15">Order</text>
  <!-- Divider -->
  <line x1="390" y1="52" x2="700" y2="52" stroke="#333" stroke-width="1.5"/>
  <!-- Attributes -->
  <text x="402" y="72" font-size="13">- orderId: number</text>
  <text x="402" y="92" font-size="13">- items: MenuItem[]</text>
  <text x="402" y="112" font-size="13">- customerName: string</text>
  <text x="402" y="132" font-size="13">- status: string</text>
  <text x="402" y="152" font-size="13" text-decoration="underline">- orderCount: number</text>
  <text x="402" y="172" font-size="13" text-decoration="underline">- taxRate: number</text>
  <!-- Divider -->
  <line x1="390" y1="182" x2="700" y2="182" stroke="#333" stroke-width="1.5"/>
  <!-- Methods -->
  <text x="402" y="202" font-size="13">+ constructor(customerName)</text>
  <text x="402" y="222" font-size="13">+ addItem(item: MenuItem): void</text>
  <text x="402" y="242" font-size="13">+ removeItem(itemName: string): void</text>
  <text x="402" y="262" font-size="13">+ calculateSubtotal(): number</text>
  <text x="402" y="282" font-size="13">+ calculateTotal(): number</text>
  <text x="402" y="302" font-size="13">+ getOrderSummary(): string</text>
  <text x="402" y="322" font-size="13" text-decoration="underline">+ getOrderCount(): number</text>
  <text x="402" y="342" font-size="13" text-decoration="underline">+ setTaxRate(rate: number): void</text>

  <!-- Association Arrow -->
  <line x1="330" y1="150" x2="390" y2="150" stroke="#333" stroke-width="2"/>
  <polygon points="385,145 395,150 385,155" fill="#333"/>
  <text x="345" y="142" font-size="11">1</text>
  <text x="375" y="142" font-size="11">*</text>
  <text x="348" y="168" font-size="11" font-style="italic">contains</text>
</svg>
